<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nested table</title>
</head>
<body>
    <table border="4">
        <tr>
            <!-- Cell 1 -->
            <td>
                <table border="3">
                    <th colspan="2">Nested Table 2</th>
                    <tr>
                        <td><b>Column 1</b></td>
                        <td><b>Column 2</b></td>
                    </tr>
                    <tr>
                        <td>abc</td>
                        <td>def</td>
                    </tr>
                </table>
            </td>
            <!-- Cell 2 -->
            <td>
                <table border="3">
                    <th>Nested Table 1</th>
                    <tr>
                        <td><ul>
                            <li>List item 1</li>
                            <li>List item 2</li>
                            <li>List item 3</li>
                        </ul></td>
                    </tr>
                </table>
            </td>
        </tr>
        <tr>
            <!-- Cell 3 -->
            <td>
                <table border="3">
                    <th colspan="2">Nested table 3</th>
                    <tr>
                        <td><a href="https://en.wikipedia.org/wiki/Nest_of_tables" target="_blank">Nested table</a></td>
                        <td>Demo Continued</td>
                    </tr>
                </table>
            </td>
            <!-- Cell 4 -->
            <td>
                <table border="3">
                    <th>Nested Table 4</th>
                    <tr><td>
                        HTML
                    </td></tr>
                </table>
            </td>
        </tr>
    </table></br>
