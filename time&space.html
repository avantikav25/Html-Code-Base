<body>
    <h1>Time and space Complexity</h1>
    <p>Time complexity is used to measure how efficient an algorithm is based on the time it takes to execute as the input size increases.
    </p>
    <p><b>Space Complexity</b> refers to the amount of memory used by an algorithm. It is commonly represented using notations like <b>O(n).</b></p>
</p>
